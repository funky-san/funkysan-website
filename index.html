<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>funkysan's website.</title>
    <link rel="icon" type="image/png" href="/resources/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a class="nav-bar-logo" href="/">
            <img class="logo" src="resources/funkysan.png" alt="Logo">
        </a>
        <a class="nav-bar-item" href="/anime-list/">anime list</a>
        <a class="nav-bar-item" href="/notes/">note taking</a>
        <a class="nav-bar-item" href="/planner/">daily planner</a>

        <a class="shift-right"></a>
        <a id="signup-nav" class="nav-bar-item" href="#">sign up</a>
        <a id="login-nav" class="nav-bar-item" href="#">login</a>
    </nav>

    <div class="modal-background hidden">
        <div id="signup-modal" class="modal hidden">
            <button class="modal-close" id="modal-close1">×</button>
            <div class="modal-content">
                <h2>create account</h2>
                <form id="signup-form" novalidate>
                    <label for="login-username">username</label>
                    <input id="login-username" type="username" autocomplete="username" required placeholder="name">

                    <label for="signup-email">email</label>
                    <input id="signup-email" type="email" autocomplete="email" required placeholder="you@example.com">

                    <label for="signup-email">password</label>
                    <input id="signup-password" type="password" autocomplete="current-password" required placeholder="••••••••">

                    <button id="signup-submit" type="submit">sign up</button>
                    <p id="signup-message" class="signup-message"></p>
                </form>
                <p class="centered">already have account? <a id="login-link" class="link">log in.</a></p>
            </div>
        </div>

        <div id="login-modal" class="modal hidden">
            <button class="modal-close" id="modal-close2">×</button>
            <div class="modal-content">
                <h2>log in</h2>
                <form id="login-form" novalidate>
                    <label for="login-email">email</label>
                    <input id="login-email" type="email" autocomplete="email" required placeholder="you@example.com">

                    <label for="login-email">password</label>
                    <input id="login-password" type="password" autocomplete="current-password" required placeholder="••••••••">

                    <button id="login-submit" type="submit">log in</button>
                    <p id="login-message" class="signup-message"></p>
                </form>
                <p class="centered">don't have an account? <a id="signup-link" class="link">sign up.</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/script.js"></script>
    <script type="module" src="js/data.js"></script>
</body>
</html>
